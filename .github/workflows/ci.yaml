name: cicd

on:
  push:
    paths:
      - src/**
    branches:
      - main

jobs:
  ci:
    outputs:
        commit_id: ${{ env.SHORT_SHA }} 
    runs-on: ubuntu-latest
    steps:
      -
        name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: get short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::6}" >> $GITHUB_ENV
    
      -
        name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: sravankumar672/pythonapp:${{ env.SHORT_SHA }}

  cd: 
    needs: ci
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v3

      - name: Modify Values
        run: |
            export TAG=${{needs.ci.outputs.commit_id}}
            sudo apt-get update
            sudo apt-get install -y yq
            yq -Yi ".image.tag = \"$TAG\"" charts/python-app/values.yaml

      
      - name: argo cd install
        run: |
            curl -ksSL -o /tmp/argocd https://argocd-server.argocd/download/argocd-linux-arm64
            chmod +x /tmp/argocd
            mv /tmp/argocd $HOME/argocd
            echo "$HOME" >> $GITHUB_PATH

      - name: Login to ArgoCd
        shell: bash
        run: |
          argocd login argocd-server.argocd \
          --grpc-web --insecure \
          --username admin \
          --password 4xQCCK7dE3tsZ5zI
          echo $TAG
          argocd app set argocd/pythonapp --helm-set image.tag=$TAG
          argocd app sync argocd/pythonapp
