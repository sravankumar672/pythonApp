name: cicd

on:
  push:
    paths:
      - src/**
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      -
        name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: get short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::6}" >> $GITHUB_ENV
    
      -
        name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: sravankumar672/pythonapp:${{ env.SHORT_SHA }}

  cd: 
    needs: ci
    runs-on: self-hosted
    steps:
      -
        name: Login to ArgoCd
        shell: bash
        run: |
          argocd login argocd-server.argocd \
          --grpc-web --insecure \
          --username admin \
          --password 4xQCCK7dE3tsZ5zI
          argocd app sync pythin-app
